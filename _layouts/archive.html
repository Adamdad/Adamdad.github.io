---
layout: default
---

<article class="page archive">
  {% unless page.hide_title %}
    <header class="page-header">
      <h1>{{ page.title }}</h1>
      {% if page.excerpt %}
        <p>{{ page.excerpt }}</p>
      {% endif %}
    </header>
  {% endunless %}

  <div class="page-content">
    {{ content }}
  </div>
</article>
